detector:
  kind: hybrid_cpu
  model_artifact: artifacts/models/hybrid_cpu.joblib
  threshold_artifact: artifacts/models/hybrid_cpu_threshold.json
  tfidf_word_ngram_max: 2
  tfidf_char_ngram_max: 5
  max_word_features: 20000
  max_char_features: 12000
  logistic_c: 3.0
  calibration_cv: 3
  threshold_metric: f1
  use_embeddings: true
  embedding_model_name: allenai/scibert_scivocab_uncased
  embedding_dim_fallback: 64
  embedding_batch_size: 8
  local_files_only: true

